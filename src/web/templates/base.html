<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NBA Fundamentals V2{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="brand-icon">&#127936;</span>
                <span class="brand-text">NBA Fundamentals</span>
                <span class="brand-version">V2</span>
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/gamecast" class="nav-link {% if request.path.startswith('/gamecast') %}active{% endif %}">Gamecast</a>
                <a href="/accuracy" class="nav-link {% if request.path == '/accuracy' %}active{% endif %}">Accuracy</a>
            </div>
            <div class="nav-actions">
                <button id="sync-btn" class="btn btn-sm btn-outline" onclick="triggerSync()">
                    <span id="sync-icon" class="sync-icon">&#8635;</span><span class="btn-label"> Sync</span>
                </button>
                <button id="shutdown-btn" class="btn btn-sm btn-outline btn-danger" onclick="shutdownServer()" title="Stop server and injury monitor">
                    &#9724;<span class="btn-label"> Shutdown</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <span class="footer-text">NBA Fundamentals V2 &mdash; Prediction Engine</span>
        </div>
    </footer>

    <script>
        async function triggerSync() {
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');
            btn.disabled = true;
            icon.classList.add('spinning');
            btn.innerHTML = '<span id="sync-icon" class="sync-icon spinning">&#8635;</span><span class="btn-label"> Syncing...</span>';

            try {
                const resp = await fetch('/api/sync', { method: 'POST' });
                const data = await resp.json();

                if (data.status === 'already_running') {
                    btn.innerHTML = '<span class="sync-icon spinning">&#8635;</span><span class="btn-label"> Running...</span>';
                } else {
                    btn.innerHTML = '<span class="sync-icon spinning">&#8635;</span><span class="btn-label"> Syncing...</span>';
                }

                // Poll for completion
                pollSync();
            } catch (e) {
                btn.innerHTML = '<span class="sync-icon">&#8635;</span><span class="btn-label"> Sync Failed</span>';
                btn.disabled = false;
            }
        }

        async function pollSync() {
            const btn = document.getElementById('sync-btn');
            try {
                const resp = await fetch('/api/sync/status');
                const data = await resp.json();
                if (data.running) {
                    setTimeout(pollSync, 3000);
                } else {
                    btn.innerHTML = '<span class="sync-icon">&#8635;</span><span class="btn-label"> Sync</span>';
                    btn.disabled = false;
                    if (data.status && data.status.includes('complete')) {
                        location.reload();
                    }
                }
            } catch (e) {
                btn.innerHTML = '<span class="sync-icon">&#8635;</span><span class="btn-label"> Sync</span>';
                btn.disabled = false;
            }
        }
    </script>
    <script>
        async function shutdownServer() {
            if (!confirm('Shut down the server and injury monitor?')) return;
            const btn = document.getElementById('shutdown-btn');
            btn.disabled = true;
            btn.textContent = 'Shutting down...';
            try {
                await fetch('/api/shutdown', { method: 'POST' });
            } catch (e) {
                // Expected — server is stopping
            }
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;color:#64748b;"><h2>Server stopped.</h2></div>';
        }
    </script>
    <!-- ─── Mobile Bottom Navigation ─── -->
    <nav class="bottom-nav">
        <a href="/" class="bnav-item {% if request.path == '/' %}active{% endif %}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            <span>Games</span>
        </a>
        <a href="/matchup" class="bnav-item {% if '/matchup' in request.path %}active{% endif %}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 8l4 4-4 4"/>
                <path d="M19 8l-4 4 4 4"/>
                <line x1="12" y1="5" x2="12" y2="19" stroke-dasharray="2 3"/>
            </svg>
            <span>Matchup</span>
        </a>
        <a href="/gamecast" class="bnav-item {% if request.path.startswith('/gamecast') %}active{% endif %}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            <span>Gamecast</span>
        </a>
        <a href="/accuracy" class="bnav-item {% if request.path == '/accuracy' %}active{% endif %}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="12" r="6"/>
                <circle cx="12" cy="12" r="2"/>
            </svg>
            <span>Accuracy</span>
        </a>
    </nav>

    {% block scripts %}{% endblock %}
</body>
</html>
